<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心理尺度 自動集計フォーム</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe2ea;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --ok: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 16px 80px;
    }

    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.3;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .notice {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fff8e6;
      border: 1px solid #f5df9b;
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .card {
      padding: 20px;
    }

    .question-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .q-number {
      min-width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .q-text {
      font-size: 17px;
      font-weight: 600;
    }

    .scale-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .choice {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s ease;
      background: #fff;
    }

    .choice:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .choice input {
      display: none;
    }

    .choice.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .choice-score {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .choice-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .actions {
      position: sticky;
      bottom: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.12);
    }

    .result {
      margin-top: 22px;
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      display: none;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 16px;
    }

    .result-box {
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fbfcff;
    }

    .result-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
    }

    .subscale-list {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .subscale-item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .comment {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      h1 { font-size: 24px; }
      .scale-grid { grid-template-columns: 1fr; }
      .actions { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 id="formTitle">心理尺度 自動集計フォーム</h1>
      <p id="formDescription">
        各項目について、現在の自分にもっとも近いものを選んでください。
      </p>
      <div class="notice" id="scaleInstruction"></div>
      <p class="muted">
        回答後に「結果を表示」を押すと、その場で自動集計されます。
      </p>
    </section>

    <form id="scaleForm"></form>

    <div class="actions">
      <button type="button" class="primary" id="submitBtn">結果を表示</button>
      <button type="button" class="secondary" id="resetBtn">リセット</button>
    </div>

    <section class="result" id="resultSection">
      <h2>集計結果</h2>
      <div class="result-grid">
        <div class="result-box">
          <div class="result-label">合計点</div>
          <div class="result-value" id="totalScore">-</div>
        </div>
        <div class="result-box">
          <div class="result-label">平均点</div>
          <div class="result-value" id="averageScore">-</div>
        </div>
      </div>

      <div class="subscale-list" id="subscaleList"></div>
      <div class="comment" id="resultComment"></div>
      <div class="footer-note" id="footerNote"></div>
    </section>
  </div>

  <script>
    // =============================
    // ここを差し替えれば、別の心理尺度にも流用できます
    // =============================
    const scaleConfig = {
      title: "心理尺度 自動集計フォーム",
      description: "各項目を注意深く読み、あなたがどの程度そのように行動するかを選んでください。",
      instruction: "回答する前に、それぞれの項目を注意深く読んでください。あなたが、各項目について、どの程度行動するか、以下の尺度に従って数字を選んでください。",
      footerNote: "※この結果は自己理解の参考情報としてご利用ください。必要に応じて、専門家への相談もご検討ください。",
      choices: [
        { value: 1, label: "ほとんど全く
そうしない" },
        { value: 2, label: "そうしない" },
        { value: 3, label: "どちらとも
いえない" },
        { value: 4, label: "そうする" },
        { value: 5, label: "ほとんどいつも
そうする" }
      ],
      items: [
        { id: "q1", text: "自分自身の欠点や不十分なところについて、不満に思っているし、批判的である。", subscale: "自己批判", reverse: true },
        { id: "q2", text: "気分が落ち込んだときには、間違ったことすべてについて、くよくよと心配し、こだわる傾向にある。", subscale: "過剰同一化", reverse: true },
        { id: "q3", text: "自分にとって重要なことを失敗した時、無力感で頭がいっぱいになる。", subscale: "過剰同一化", reverse: true },
        { id: "q4", text: "何かで苦しい想いをしたときは、感情を適度なバランスに保つようにする。", subscale: "マインドフルネス" },
        { id: "q5", text: "自分自身にどこかに不十分なところがあると感じると、多くの人も不十分であるという気持ちを共有していることを思い出すようにする。", subscale: "共通の人間性" },
        { id: "q6", text: "自分のパーソナリティの好きでないところについては、やさしくなれないし、いらだちを感じる。", subscale: "自己批判", reverse: true },
        { id: "q7", text: "苦労を経験しているとき、必要とする程度に自分自身をいたわり、やさしくする。", subscale: "自分への優しさ" },
        { id: "q8", text: "気分が落ち込んだとき、多くの人がおそらく自分より幸せであるという気持ちになりがちである。", subscale: "孤独感", reverse: true },
        { id: "q9", text: "何か苦痛を感じることが起こったとき、その状況についてバランスのとれた見方をするようにする。", subscale: "マインドフルネス" },
        { id: "q10", text: "自分の失敗は、人間のありようの1つであると考えるようにしている。", subscale: "共通の人間性" },
        { id: "q11", text: "自分にとって大切な何かに失敗したとき、自分の失敗の中でひとりぼっちでいるように感じる傾向がある。", subscale: "孤独感", reverse: true },
        { id: "q12", text: "自分のパーソナリティの好きではないところについては理解し、やさしい目で見るようにしている。", subscale: "自分への優しさ" }
      ],
      interpretation: [
        {
          min: 12,
          max: 24,
          label: "低め",
          comment: "判定コメントは未設定です。あとで集計方法に合わせて差し替えます。"
        },
        {
          min: 25,
          max: 42,
          label: "中程度",
          comment: "判定コメントは未設定です。あとで集計方法に合わせて差し替えます。"
        },
        {
          min: 43,
          max: 60,
          label: "高め",
          comment: "判定コメントは未設定です。あとで集計方法に合わせて差し替えます。"
        }
      ]
    };

    const formEl = document.getElementById("scaleForm");
    const resultSection = document.getElementById("resultSection");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");

    document.getElementById("formTitle").textContent = scaleConfig.title;
    document.getElementById("formDescription").textContent = scaleConfig.description;
    document.getElementById("scaleInstruction").textContent = scaleConfig.instruction;
    document.getElementById("footerNote").textContent = scaleConfig.footerNote;

    function renderForm() {
      formEl.innerHTML = "";

      scaleConfig.items.forEach((item, index) => {
        const card = document.createElement("section");
        card.className = "card";

        const head = document.createElement("div");
        head.className = "question-head";
        head.innerHTML = `
          <div class="q-number">${index + 1}</div>
          <div>
            <div class="q-text">${item.text}</div>
            <div class="muted">${item.subscale ? `下位尺度：${item.subscale}` : ""}${item.reverse ? "　/　逆転項目" : ""}</div>
          </div>
        `;

        const grid = document.createElement("div");
        grid.className = "scale-grid";

        scaleConfig.choices.forEach(choice => {
          const label = document.createElement("label");
          label.className = "choice";
          label.innerHTML = `
            <input type="radio" name="${item.id}" value="${choice.value}">
            <span class="choice-score">${choice.value}</span>
            <span class="choice-label">${choice.label.replace(/\n/g, "<br>")}</span>
          `;

          const input = label.querySelector("input");
          input.addEventListener("change", () => {
            document.querySelectorAll(`input[name="${item.id}"]`).forEach(r => {
              r.closest(".choice").classList.remove("selected");
            });
            label.classList.add("selected");
          });

          grid.appendChild(label);
        });

        card.appendChild(head);
        card.appendChild(grid);
        formEl.appendChild(card);
      });
    }

    function getMaxChoiceValue() {
      return Math.max(...scaleConfig.choices.map(c => c.value));
    }

    function collectAnswers() {
      const answers = {};
      let missing = [];

      scaleConfig.items.forEach((item, index) => {
        const checked = document.querySelector(`input[name="${item.id}"]:checked`);
        if (!checked) {
          missing.push(index + 1);
        } else {
          answers[item.id] = Number(checked.value);
        }
      });

      return { answers, missing };
    }

    function scoreAnswers(rawAnswers) {
      const max = getMaxChoiceValue();
      const scoredItems = [];
      const subscaleScores = {};
      let total = 0;

      scaleConfig.items.forEach(item => {
        const raw = rawAnswers[item.id];
        const scored = item.reverse ? (max + 1 - raw) : raw;

        scoredItems.push({
          id: item.id,
          text: item.text,
          raw,
          scored,
          subscale: item.subscale || "その他"
        });

        total += scored;
        const key = item.subscale || "その他";
        if (!subscaleScores[key]) {
          subscaleScores[key] = { total: 0, count: 0 };
        }
        subscaleScores[key].total += scored;
        subscaleScores[key].count += 1;
      });

      return {
        total,
        average: total / scaleConfig.items.length,
        scoredItems,
        subscaleScores
      };
    }

    function getInterpretation(total) {
      return scaleConfig.interpretation.find(rule => total >= rule.min && total <= rule.max)
        || { label: "判定なし", comment: "判定基準が設定されていません。" };
    }

    function renderResult(result) {
      document.getElementById("totalScore").textContent = `${result.total}点`;
      document.getElementById("averageScore").textContent = result.average.toFixed(2);

      const subscaleList = document.getElementById("subscaleList");
      subscaleList.innerHTML = "";

      const descriptions = {
        "自分への優しさ": "自分の良い所やできている部分に注目し、やさしい言葉をかける。",
        "自己批判": "自分の駄目な所に注目し、批判的な言葉をかける。",
        "マインドフルネス": "自分の感情を偏りなく受け入れ、バランスのとれた見方をする。",
        "過剰同一化": "否定的な感情に支配され、頭の中が混乱してしまう。",
        "共通の人間性": "他の人も自分と同じような困難を経験し、そこから立ち直っていることを認識する。",
        "孤独感": "自分だけ困難に直面して苦しみ、孤立していると感じる。"
      };

      Object.entries(result.subscaleScores).forEach(([name, value]) => {
        const item = document.createElement("div");
        item.className = "subscale-item";
        item.innerHTML = `
          <div>
            <strong>${name}</strong><br>
            <span class="muted">${descriptions[name] || ""}</span>
          </div>
          <div style="text-align:right;">
            <strong>${value.total}点</strong>
          </div>
        `;
        subscaleList.appendChild(item);
      });

      document.getElementById("resultComment").innerHTML = `
        <strong>セルフ・コンパッション：</strong>${result.total}点<br>
        失敗や傷ついた経験の後に、自分の感情をバランスよく受け入れ、その経験が他の人たちとも共通していることを認識し、自分に優しい気持ちを向ける傾向を示します。
      `;

      resultSection.style.display = "block";
      resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    submitBtn.addEventListener("click", () => {
      const { answers, missing } = collectAnswers();

      if (missing.length > 0) {
        alert(`未回答の項目があります。\n未回答: ${missing.join(", ")}番`);
        return;
      }

      const result = scoreAnswers(answers);
      renderResult(result);
    });

    resetBtn.addEventListener("click", () => {
      document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.checked = false;
      });
      document.querySelectorAll('.choice').forEach(el => el.classList.remove('selected'));
      resultSection.style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderForm();
  </script>
</body>
</html>
